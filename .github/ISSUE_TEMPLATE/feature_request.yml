name: 💡 Feature Request
description: Suggest a new feature or improvement
labels: enhancement
body:
  - type: checkboxes
    id: issue-type
    attributes:
      label: Issue Type
      options:
        - label: "💡 This is a feature suggestion"
          required: true
  - type: textarea
    id: problem-summary
    attributes:
      label: Problem / Motivation
      description: Describe the problem or need this feature addresses
      placeholder: Tell us what problem this solves...
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed solution
      placeholder: How would you like this to work...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions you've considered
      placeholder: List any alternatives you've thought of...
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, examples, or other context
      placeholder: Add any other information here...
