name: 🐛 Bug Report
description: Report something that isn't working correctly
labels: bug
body:
  - type: checkboxes
    id: issue-type
    attributes:
      label: Issue Type
      options:
        - label: "🐛 This is a bug (something doesn't work)"
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: Describe the bug in detail...
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How to reproduce this bug
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: Tell us what should happen...
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Tell us what went wrong...
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      description: Astrbot Plugin GM version (e.g., v1.2.0)
      placeholder: v1.x.x
  - type: input
    id: astrbot-version
    attributes:
      label: Astrbot Version
      description: Astrbot core version
      placeholder: e.g., v3.x.x
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime Environment
      options:
        - OneBot V11
        - OneBot V12
        - Telegram
        - Discord
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Error Messages
      description: Paste relevant error messages or logs (use ``` to format)
      placeholder: |
        ```
        Paste logs or error messages here
        ```
